{% if view.rows_control %}
<div class="dropdown">
  <button class="btn btn-sm btn-outline-primary dropdown-toggle mx-1" type="button" id="{{ table.prefix }}dropdownRowsButton"
          data-toggle= "dropdown" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Show {{ per_page }} rows</button>
  <div class="dropdown-menu dropdown-menu-right" aria-labelledby="{{ table.prefix }}dropdownRowsButton">
    {% for row in rows %}
      <div class="dropdown-item" id="{{ table.prefix }}~row~{{ row }}" hx-get="{{ url }}" hx-include="#{{ table.prefix }}filter_form">
        {{ row }} rows
      </div>
    {% endfor %}
  </div>
</div>
{% endif %}
